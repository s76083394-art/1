<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0a10" />
    <title>Login - Novel Maker</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .login-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }
      .login-card {
        width: min(380px, 100%);
        padding: 2rem;
        display: grid;
        gap: 1.5rem;
      }
      .login-header {
        text-align: center;
      }
      .login-header h1 {
        margin: 0;
        font-family: var(--serif);
        font-size: 2rem;
        background: linear-gradient(135deg, #fff 30%, var(--accent-strong));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .login-header p {
        margin: 0.5rem 0 0;
        color: var(--ink-secondary);
      }
    </style>
  </head>
  <body>
    <div class="login-shell">
      <form id="loginForm" class="surface login-card">
        <div class="login-header">
          <h1>Novel Maker</h1>
          <p>개인 클라우드 접근을 위해 로그인하세요.</p>
        </div>
        
        <label class="field">
          <span>Password</span>
          <input type="password" id="passwordInput" placeholder="Enter password" required autofocus />
        </label>
        
        <button type="submit" class="primary-button" id="loginBtn">로그인</button>
        <div id="errorMsg" class="kicker" style="color: var(--danger); text-align: center; display: none;"></div>
      </form>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const errorMsg = document.getElementById("errorMsg");
      const btn = document.getElementById("loginBtn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        btn.disabled = true;
        errorMsg.style.display = "none";
        
        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: document.getElementById("passwordInput").value })
          });
          if (res.ok) {
            window.location.href = "/";
          } else {
            const data = await res.json();
            throw new Error(data.error || "Login failed");
          }
        } catch (err) {
          errorMsg.textContent = err.message;
          errorMsg.style.display = "block";
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
